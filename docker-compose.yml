version: '3.8'

services:
  terminal-chatroom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: terminal-chatroom
    restart: unless-stopped
    ports:
      - "3000:3000"  # HTTP 端口
      - "3001:3001"  # WebSocket 端口
    volumes:
      - chat-data:/app/data  # SQLite 数据持久化
    environment:
      - NODE_ENV=production
      - PORT=3000
      - WS_PORT=3001
      - DB_PATH=/app/data/chat.db
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  chat-data:
    driver: local
